<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JJ-STUDIO</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #050814;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* LOGO (YARI BOYUT) */
.logo {
    width: 45%;
    max-width: 500px;
    height: auto;
    margin-bottom: 30px;
    border-radius: 12px;
}

/* BUTTON */
button {
    background: white;
    color: black;
    border: none;
    padding: 15px 40px;
    font-size: 18px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
    background: #eaeaea;
}
</style>
</head>

<body>

<!-- LOGO -->
<img src="logo.png" class="logo">

<!-- BUTTON -->
<button onclick="copyText()">Get HUB</button>

<script>
function copyText() {
    navigator.clipboard.writeText("test 1123");
    alert("Coppied!!: test 1123");
}
</script>

</body>
</html>
