<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JJ-STUDIO</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #050814;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px;
    font-family: Arial, sans-serif;
    color: white;

    /* NEON BORDER */
    box-shadow:
        inset 0 0 0 3px #00f0ff,
        inset 0 0 20px #00f0ff,
        inset 0 0 40px #ff00ff;
}

/* SOL YAZI */
.text {
    width: 40%;
    color: white;
}

.text h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

.text p {
    margin: 5px 0;
    line-height: 1.4;
    font-size: 16px;
}

/* SAĞ TARAF */
.right {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* LOGO */
.logo {
    width: 45%;
    max-width: 500px;
    height: auto;
    margin-bottom: 30px;
    border-radius: 12px;
}

/* BUTTON */
button {
    background: white;
    color: black;
    border: none;
    padding: 15px 40px;
    font-size: 18px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
    background: #eaeaea;
}
</style>
</head>

<body>

<div class="text">
    <h1>JoJo Hub Nedir</h1>

    <p>JoJo Hub özgün yüzlerce script içeren bir menüdür.</p>
    <p>Ayrıca her oyun için script içerir.</p>
    <p>Key sistemi yoktur.</p>
    <p>Benim için kullanıcı deneyimi çok önemlidir.</p>
    <p>"Hile kazandırır" by JoJo</p>
</div>

<div class="right">

    <img src="logo.png" class="logo">

    <button onclick="copyText()">Get HUB</button>

</div>

<script>
function copyText() {
    navigator.clipboard.writeText("test 1123");
    alert("Kopyalandı: test 1123");
}
</script>

</body>
</html>
